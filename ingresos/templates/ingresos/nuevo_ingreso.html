{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>Nuevo Ingreso</h2>

            <a href="/productos/nuevo/" class="btn btn-primary">
                + Nuevo Producto
            </a>

        </div>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">
                Guardar Ingreso
            </button>

            <a href="/ingresos/" class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>

</div>

{% endblock %}
