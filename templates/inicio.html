{% extends 'base.html' %}

{% load static %}

{% block content %}

<style>

    body{
        background-color: #f4f6f9;
    }

    .card-modulo{
        transition: 0.3s;
        border-radius: 15px;
    }

    .card-modulo:hover{
        transform: translateY(-5px);
        box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
    }

    .logo-empresa{
        max-width: 250px;
    }

</style>

<div class="container mt-4">

    <div class="card shadow border-0 mb-5">

        <div class="card-body text-center">

            <img src="{% static 'img/Fondo.png' %}"
                 alt="Empresa"
                 class="logo-empresa mb-4">

            <h1 class="fw-bold text-primary">
                Sistema de Gestión Empresarial
            </h1>

            <p class="text-muted fs-5">
                Bienvenido al sistema principal
            </p>

        </div>

    </div>

    <div class="row g-4 justify-content-center">

        <div class="col-md-3">

            <a href="/ventas/" class="text-decoration-none">

                <div class="card shadow text-center h-100 card-modulo border-0">

                    <div class="card-body">

                        <h1>🛒</h1>

                        <h5 class="mt-3 text-dark">
                            Ventas
                        </h5>

                    </div>

                </div>

            </a>

        </div>

        <div class="col-md-3">

            <a href="/productos/" class="text-decoration-none">

                <div class="card shadow text-center h-100 card-modulo border-0">

                    <div class="card-body">

                        <h1>📦</h1>

                        <h5 class="mt-3 text-dark">
                            Productos
                        </h5>

                    </div>

                </div>

            </a>

        </div>

        <div class="col-md-3">

            <a href="/ingresos/" class="text-decoration-none">

                <div class="card shadow text-center h-100 card-modulo border-0">

                    <div class="card-body">

                        <h1>💰</h1>

                        <h5 class="mt-3 text-dark">
                            Ingresos
                        </h5>

                    </div>

                </div>

            </a>

        </div>

        <div class="col-md-3">

            <a href="/gastos/" class="text-decoration-none">

                <div class="card shadow text-center h-100 card-modulo border-0">

                    <div class="card-body">

                        <h1>📉</h1>

                        <h5 class="mt-3 text-dark">
                            Gastos
                        </h5>

                    </div>

                </div>

            </a>

        </div>

        <div class="col-md-3">

            <a href="/finanzas/" class="text-decoration-none">

                <div class="card shadow text-center h-100 card-modulo border-0">

                    <div class="card-body">

                        <h1>📊</h1>

                        <h5 class="mt-3 text-dark">
                            Finanzas
                        </h5>

                    </div>

                </div>

            </a>

        </div>

    </div>

</div>

{% endblock %}
