<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yess Boutique</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color: #f5f5f5;
        }

        .sidebar{
            width: 250px;
            height: 100vh;
            position: fixed;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar h3{
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a{
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 25px;
        }

        .sidebar a:hover{
            background: #343a40;
        }

        .content{
            margin-left: 260px;
            padding: 20px;
        }

        .card{
            border: none;
            border-radius: 15px;
        }

    </style>

</head>
<body>

<div class="sidebar">

    <h3>Yess Boutique</h3>

    <a class="nav-link" href="{% url 'inicio' %}">
        🏠 Inicio
    </a>


    <a href="/ventas/">🛒 Ventas</a>
    <a href="/productos/">📦 Inventario</a>
    <a href="/ingresos/">📥 Mercadería</a>
    <a href="/gastos/">💸 Gastos</a>
    <a href="/finanzas/">💰 Finanzas</a>

</div>

<div class="content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
