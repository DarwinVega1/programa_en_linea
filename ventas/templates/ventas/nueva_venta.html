{% extends 'base.html' %}

{% block content %}

<div class="card p-4 shadow">

    <h3>Nueva Venta</h3>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-success">
            Guardar
        </button>

        <a href="{% url 'lista_ventas' %}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
